<!DOCTYPE html>
<html lang="en">
<head>
    <STYLE>
        button{
            padding: 10px 20px;
            font-size:16px;
            cursor:pointer;
        }   
    </STYLE>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="tittle">Welcome</h1>
    <button onclick="changetext()">Click me</button>

    <script>
        function changetext(){
            //select element by using get elemnt by id
            let heading =document.getElementById("tittle");

            //change the text context

            heading.innerText="Hello Student ! Welcome nikhil bhaiya ";

            heading.style.color="blue";
 }


    </script>
</body>
</html>
